<style>
/* ══════════════════════════════════════════════════════════
   CSS DESIGN TOKENS
   ══════════════════════════════════════════════════════════ */
:root {
  --ease-out:    cubic-bezier(0.22, 1, 0.36, 1);
  --font-display:'Bebas Neue', sans-serif;
  --font-body:   'DM Sans', sans-serif;
  --font-serif:  'Cormorant Garamond', serif;
  --nav-h:       64px;
  --trans:       0.45s var(--ease-out);
  --gap:         6px;
  --radius:      6px;
}

/* DARK theme (default) */
[data-theme="dark"] {
  --bg:          #0d0d0d;
  --bg-surface:  #111111;
  --bg-card:     #161616;
  --border:      rgba(255,255,255,0.07);
  --border-h:    rgba(255,255,255,0.14);
  --text:        #e8e4de;
  --text-muted:  #5e5a56;
  --text-dim:    #8a8580;
  --noise-op:    0.028;
  --vignette:    rgba(0,0,0,0.45);
  --lb-bg:       rgba(0,0,0,0.97);
  --card-hover:  rgba(255,255,255,0.03);
}

/* LIGHT theme */
[data-theme="light"] {
  --bg:          #f4f2ec;
  --bg-surface:  #faf9f5;
  --bg-card:     #fefefe;
  --border:      rgba(0,0,0,0.08);
  --border-h:    rgba(0,0,0,0.16);
  --text:        #0f1e1c;
  --text-muted:  #a0a8a6;
  --text-dim:    #6b7574;
  --noise-op:    0.045;
  --vignette:    rgba(0,0,0,0.08);
  --lb-bg:       rgba(15,30,28,0.97);
  --card-hover:  rgba(0,0,0,0.02);
}

/* ── ACCENT injected by JS per-theme ── */
/* Defaults (MLX orange) */
:root {
  --accent:      #FF8A00;
  --accent-soft: rgba(255,138,0,0.10);
  --accent-glow: rgba(255,138,0,0.22);
}

/* ══════════════════════════════════════════════════════════
   RESET
   ══════════════════════════════════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  min-height: 100vh;
  transition: background var(--trans), color var(--trans);
  position: relative;
}

/* ── wave canvas ── */
#langWaveCanvas {
  position:fixed; inset:0;
  z-index:2500; display:none;
  pointer-events:none;
}
#langWaveCanvas.active { display:block; }

/* ── grain ── */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:var(--noise-op);
  pointer-events:none; z-index:9999;
  animation:grainDrift 8s steps(2) infinite;
  transition:opacity var(--trans);
}
@keyframes grainDrift {
  0%,100%{transform:translate(0,0)}
  25%    {transform:translate(-1px,1px)}
  50%    {transform:translate(1px,-1px)}
  75%    {transform:translate(-1px,-1px)}
}

/* ── vignette ── */
.page-vignette {
  position:fixed; inset:0;
  pointer-events:none; z-index:9998;
  background:radial-gradient(ellipse at 50% 40%, transparent 55%, var(--vignette) 100%);
  transition:background var(--trans);
}

/* ══════════════════════════════════════════════════════════
   PASSWORD SCREEN
   ══════════════════════════════════════════════════════════ */
.pw-screen {
  position:fixed; inset:0;
  background:var(--bg);
  z-index:5000;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:24px;
  text-align:center;
}
.pw-screen.hidden { display:none; }
.pw-logo { font-family:var(--font-display); font-size:48px; letter-spacing:.12em; color:var(--accent); }
.pw-title { font-size:12px; letter-spacing:.3em; text-transform:uppercase; color:var(--text-muted); }
.pw-input {
  padding:14px 20px; width:280px; max-width:90vw;
  background:var(--bg-surface); border:1px solid var(--border);
  border-radius:var(--radius); color:var(--text);
  font-family:var(--font-body); font-size:15px; outline:none;
  text-align:center; letter-spacing:.1em;
  transition:border-color .2s, box-shadow .2s;
}
.pw-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
.pw-btn {
  padding:13px 32px; background:var(--accent); color:#000;
  border:none; border-radius:var(--radius); cursor:pointer;
  font-family:var(--font-body); font-size:13px; font-weight:600;
  letter-spacing:.1em; text-transform:uppercase;
  transition:opacity .2s, transform .2s;
}
.pw-btn:hover { opacity:.85; transform:translateY(-1px); }
.pw-error { font-size:12px; color:#ff4444; opacity:0; transition:opacity .2s; }
.pw-error.show { opacity:1; }

/* ══════════════════════════════════════════════════════════
   NAV — matching mlxmedia.cz exactly
   ══════════════════════════════════════════════════════════ */
.nav {
  position:fixed; top:0; left:0; right:0;
  height:var(--nav-h); z-index:1000;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 clamp(16px,3vw,40px);
  transition:background var(--trans), border-color var(--trans), box-shadow var(--trans);
}
.nav.scrolled {
  background:color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}

.nav-left { display:flex; align-items:center; gap:16px; flex:1; min-width:0; }

.nav-logo {
  font-family:var(--font-display); font-size:1.5rem;
  letter-spacing:.12em; color:var(--text); text-decoration:none;
  flex-shrink:0;
  transition:color .2s;
}
.nav-logo span { color:var(--accent); }
.nav-logo:hover { color:var(--accent); }

.nav-sep { width:1px; height:20px; background:var(--border); flex-shrink:0; }

.nav-event {
  font-size:11px; letter-spacing:.1em; color:var(--text-muted);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  text-transform:uppercase; max-width:220px;
}

.nav-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }

.nav-fav-count {
  font-size:11px; color:var(--text-dim); letter-spacing:.08em;
  padding:4px 12px; border:1px solid var(--border);
  border-radius:20px; cursor:pointer;
  transition:border-color .2s, color .2s;
  white-space:nowrap;
}
.nav-fav-count:hover, .nav-fav-count.active {
  border-color:var(--accent); color:var(--accent);
}
.nav-fav-count.has-favs { border-color:var(--accent); color:var(--accent); }

/* sound toggle */
.sound-toggle {
  width:48px; height:26px; background:var(--bg-card); border:1px solid var(--border);
  border-radius:99px; cursor:pointer; position:relative; flex-shrink:0;
  transition:background var(--trans), border-color var(--trans);
}
.sound-toggle::after {
  content:''; position:absolute; top:3px; left:3px;
  width:18px; height:18px; border-radius:50%; background:var(--text-muted);
  transition:transform .35s var(--ease-out), background var(--trans);
}
.sound-toggle.active::after { transform:translateX(22px); background:var(--accent); }
.sound-icon {
  position:absolute; inset:0; display:flex; align-items:center;
  justify-content:space-between; padding:0 5px; font-size:10px; pointer-events:none;
  font-family:"Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",sans-serif;
}

/* lang toggle — exact MLX style */
.lang-toggle {
  width:64px; height:26px;
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:99px; cursor:pointer; position:relative;
  display:flex; align-items:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
  transition:background var(--trans), border-color var(--trans);
  overflow:hidden; flex-shrink:0;
}
.lang-toggle::before {
  content:''; position:absolute; top:2px; left:2px;
  width:calc(50% - 2px); height:calc(100% - 4px);
  border-radius:99px; background:var(--accent);
  transition:transform .35s var(--ease-out);
}
.lang-toggle[data-lang="en"]::before { transform:translateX(100%); }
.lang-option {
  position:relative; z-index:1; width:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-size:10px; letter-spacing:.12em;
  color:var(--text-muted); transition:color .35s var(--ease-out);
  user-select:none; line-height:1;
}
.lang-option.active { color:var(--bg); font-weight:700; }

/* theme toggle */
.theme-toggle {
  width:48px; height:26px;
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:99px; cursor:pointer; position:relative;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08), 0 2px 6px rgba(0,0,0,.1);
  transition:background var(--trans), border-color var(--trans);
  flex-shrink:0;
}
.theme-toggle::after {
  content:''; position:absolute; top:3px; left:3px;
  width:18px; height:18px; border-radius:50%;
  background:var(--accent);
  box-shadow:0 1px 3px rgba(0,0,0,.25);
  transition:transform .35s var(--ease-out), background var(--trans);
}
[data-theme="light"] .theme-toggle::after { transform:translateX(22px); }

.toggle-icons { position:absolute; inset:0; display:flex; align-items:center; justify-content:space-between; padding:0 5px; font-size:10px; pointer-events:none; }

/* hamburger */
.nav-hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:4px; flex-shrink:0; }
.nav-hamburger span { display:block; width:22px; height:2px; background:var(--text); border-radius:2px; transition:transform .3s, opacity .3s; }
.nav-hamburger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
.nav-hamburger.open span:nth-child(2) { opacity:0; }
.nav-hamburger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }

.nav-mobile {
  display:flex; flex-direction:column;
  position:fixed; top:var(--nav-h); left:0; right:0;
  background:color-mix(in srgb, var(--bg) 96%, transparent);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:20px 24px 28px; z-index:999;
  visibility:hidden; opacity:0; transform:translateY(-8px);
  transition:opacity .3s var(--ease-out), transform .3s var(--ease-out), visibility .3s;
  pointer-events:none;
}
.nav-mobile.open { visibility:visible; opacity:1; transform:translateY(0); pointer-events:auto; }
.nav-mobile-row { display:flex; align-items:center; gap:12px; padding:14px 0; border-bottom:1px solid var(--border); }
.nav-mobile-row:last-child { border-bottom:none; }
.nav-mobile-label { font-size:.8rem; letter-spacing:.1em; text-transform:uppercase; color:var(--text-dim); flex:1; }

@media(max-width:768px) {
  .nav-right .lang-toggle,
  .nav-right .theme-toggle,
  .nav-right .nav-fav-count { display:none; }
  .nav-hamburger { display:flex; }
}

/* ══════════════════════════════════════════════════════════
   HERO
   ══════════════════════════════════════════════════════════ */
.hero {
  padding: calc(var(--nav-h) + 60px) clamp(20px,5vw,80px) 64px;
  text-align:center; position:relative; overflow:hidden;
}

/* ambient glow */
.hero::before {
  content:'';
  position:absolute; inset:0;
  background:radial-gradient(ellipse 70% 60% at 50% -5%, var(--accent-soft), transparent);
  pointer-events:none; transition:background var(--trans);
}

/* giant bg letter */
.hero-bg-letter {
  position:absolute;
  font-family:var(--font-display);
  font-size:clamp(180px,35vw,500px);
  color:var(--accent); opacity:.04;
  line-height:1; pointer-events:none; user-select:none;
  top:50%; left:50%; transform:translate(-50%,-50%);
  letter-spacing:-.04em; transition:color var(--trans);
}

.hero-eyebrow {
  font-size:clamp(.6rem,1.4vw,.72rem); letter-spacing:.35em;
  text-transform:uppercase; color:var(--accent);
  margin-bottom:20px;
  opacity:0; transform:translateY(16px);
  animation:fadeUp .8s var(--ease-out) .2s forwards;
}

.hero-title {
  font-family:var(--font-display);
  font-size:clamp(3.2rem,9vw,8.5rem);
  letter-spacing:.05em; line-height:.92;
  color:var(--text); margin-bottom:8px;
  opacity:0; transform:translateY(24px);
  animation:fadeUp .9s var(--ease-out) .35s forwards;
}
.hero-title em { font-style:normal; color:var(--accent); }

.hero-subtitle {
  font-size:clamp(.85rem,1.8vw,1rem);
  font-weight:300; color:var(--text-dim);
  max-width:480px; line-height:1.8; margin:22px auto 0;
  opacity:0; transform:translateY(16px);
  animation:fadeUp .9s var(--ease-out) .55s forwards;
}

.hero-stripe {
  width:160px; height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  margin:28px auto 16px;
  opacity:0; animation:fadeUp .8s var(--ease-out) .7s forwards;
  transition:background var(--trans);
}

.hero-date {
  display:inline-block; font-size:10px;
  letter-spacing:.28em; color:var(--text-muted);
  text-transform:uppercase;
  opacity:0; animation:fadeUp .8s var(--ease-out) .85s forwards;
}

.hero-scroll {
  position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:8px;
  opacity:0; animation:fadeUp .8s var(--ease-out) 1.1s forwards;
}
.hero-scroll span { font-size:.6rem; letter-spacing:.22em; text-transform:uppercase; color:var(--text-muted); }
.scroll-line {
  width:1px; height:38px;
  background:linear-gradient(to bottom, var(--accent), transparent);
  animation:scrollPulse 2s ease-in-out 1.5s infinite;
}
@keyframes scrollPulse {
  0%,100%{opacity:.3;transform:scaleY(1)}
  50%{opacity:1;transform:scaleY(1.2)}
}

/* ══════════════════════════════════════════════════════════
   CONTROLS BAR
   ══════════════════════════════════════════════════════════ */
.controls-wrap {
  position:sticky; top:var(--nav-h); z-index:100;
  background:color-mix(in srgb, var(--bg) 92%, transparent);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  transition:background var(--trans), border-color var(--trans);
}

.controls {
  max-width:1600px; margin:0 auto;
  padding:12px clamp(16px,3vw,40px);
  display:flex; flex-direction:column; gap:10px;
  opacity:0; animation:fadeUp .7s var(--ease-out) 1s forwards;
}

.controls-top {
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
}

.search-wrap { position:relative; flex:1; min-width:200px; }
.search-icon {
  position:absolute; left:13px; top:50%; transform:translateY(-50%);
  color:var(--text-dim); pointer-events:none;
  display:flex; align-items:center;
}
.search-input {
  width:100%; padding:10px 14px 10px 40px;
  background:var(--bg-surface); border:1px solid var(--border);
  border-radius:var(--radius); color:var(--text);
  font-family:var(--font-body); font-size:13px;
  outline:none; transition:border-color .2s, box-shadow .2s;
}
.search-input::placeholder { color:var(--text-dim); }
.search-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }

/* view buttons */
.view-btns { display:flex; gap:4px; flex-shrink:0; }
.view-btn {
  width:34px; height:34px; border-radius:var(--radius);
  background:var(--bg-surface); border:1px solid var(--border);
  color:var(--text-dim); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:border-color .2s, color .2s, background .2s;
  flex-shrink:0;
}
.view-btn:hover { border-color:var(--border-h); color:var(--text); }
.view-btn.active { background:var(--accent); border-color:var(--accent); color:#000; }
.view-btn svg { pointer-events:none; }

/* slideshow + download-all btns */
.ctrl-btn {
  padding:0 16px; height:34px;
  border-radius:var(--radius);
  background:var(--bg-surface); border:1px solid var(--border);
  color:var(--text-muted); cursor:pointer; flex-shrink:0;
  font-family:var(--font-body); font-size:11px; letter-spacing:.1em;
  text-transform:uppercase; font-weight:500;
  display:flex; align-items:center; gap:7px;
  transition:border-color .2s, color .2s, background .2s;
}
.ctrl-btn:hover { border-color:var(--border-h); color:var(--text); }
.ctrl-btn.active { border-color:var(--accent); color:var(--accent); }
.ctrl-btn.primary { background:var(--accent); border-color:var(--accent); color:#000; }
.ctrl-btn.primary:hover { opacity:.88; }

/* filter pills row */
.filter-row { display:flex; flex-wrap:wrap; gap:6px; align-items:center; min-height:20px; }
.filter-row:empty { display:none; }
.filter-label {
  font-size:9px; letter-spacing:.22em;
  color:var(--text-dim); text-transform:uppercase;
  flex-shrink:0; margin-right:2px;
}
.pill {
  padding:4px 13px; border-radius:20px; font-size:11px;
  border:1px solid var(--border); background:transparent;
  color:var(--text-muted); cursor:pointer;
  transition:border-color .2s, color .2s, background .2s;
  letter-spacing:.04em; font-family:var(--font-body);
}
.pill:hover { border-color:var(--border-h); color:var(--text); }
.pill.active { background:var(--accent); border-color:var(--accent); color:#000; font-weight:500; }

/* results bar */
.results-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px clamp(16px,3vw,40px) 0;
  max-width:1600px; margin:0 auto;
  opacity:0; animation:fadeUp .7s var(--ease-out) 1.1s forwards;
}
.results-count { font-size:11px; color:var(--text-dim); letter-spacing:.08em; }
.results-actions { display:flex; align-items:center; gap:12px; }
.results-clear {
  font-size:11px; color:var(--accent); cursor:pointer;
  background:none; border:none; font-family:var(--font-body);
  letter-spacing:.06em; display:none;
}
.results-clear.visible { display:block; }
.results-clear:hover { opacity:.7; }

/* ══════════════════════════════════════════════════════════
   GALLERY VIEWS
   ══════════════════════════════════════════════════════════ */
.gallery-wrap {
  max-width:1600px; margin:0 auto;
  padding:16px clamp(16px,3vw,40px) 48px;
}

/* ── MOSAIC view (default) ── */
.gallery-grid {
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  grid-auto-rows:210px;
  gap:var(--gap);
  grid-auto-flow:dense;
}
.photo-item[data-orientation="portrait"]  { grid-row:span 2; }
.photo-item[data-orientation="landscape"] { grid-column:span 2; }
.photo-item[data-featured="true"]         { grid-column:span 2; grid-row:span 2; }

/* ── GRID view ── */
.gallery-grid.view-grid {
  grid-template-columns:repeat(4,1fr);
  grid-auto-rows:240px;
}
.gallery-grid.view-grid .photo-item { grid-column:auto !important; grid-row:auto !important; }
.gallery-grid.view-grid .photo-item[data-orientation="portrait"]  { grid-row:span 1 !important; }
.gallery-grid.view-grid .photo-item[data-orientation="landscape"] { grid-column:span 1 !important; }
.gallery-grid.view-grid .photo-item[data-featured="true"]         { grid-column:span 1 !important; grid-row:span 1 !important; }

/* ── LIST view ── */
.gallery-grid.view-list {
  grid-template-columns:1fr;
  grid-auto-rows:auto;
}
.gallery-grid.view-list .photo-item {
  grid-column:1 !important; grid-row:auto !important;
  display:flex; align-items:stretch;
  height:120px;
}
.gallery-grid.view-list .photo-item img { width:180px; flex-shrink:0; }
.gallery-grid.view-list .photo-overlay {
  position:relative; opacity:1 !important;
  background:none; flex:1; padding:16px 20px;
  justify-content:center;
}
.gallery-grid.view-list .overlay-title { font-size:14px; color:var(--text); font-weight:500; }
.gallery-grid.view-list .overlay-desc  { font-size:12px; color:var(--text-muted); margin-top:4px; }
.gallery-grid.view-list .overlay-tags  { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
.gallery-grid.view-list .overlay-tag   { font-size:10px; padding:2px 8px; border-radius:3px; background:var(--bg-surface); border:1px solid var(--border); color:var(--text-dim); letter-spacing:.04em; }
.gallery-grid.view-list .photo-num { bottom:auto; top:8px; }

/* ── Density mods ── */
.gallery-grid.density-compact { grid-auto-rows:160px; gap:3px; border-radius:0; }
.gallery-grid.density-large   { grid-auto-rows:280px; gap:10px; }

/* ── Photo card ── */
.photo-item {
  position:relative; overflow:hidden;
  border-radius:var(--radius); background:var(--bg-card);
  cursor:zoom-in;
  opacity:0; transform:translateY(14px);
  animation:fadeUp .55s var(--ease-out) forwards;
  transition:box-shadow .3s;
}
.photo-item:hover { box-shadow:0 0 0 1px var(--border-h); }

.photo-item img {
  width:100%; height:100%; object-fit:cover; display:block;
  transition:transform .7s var(--ease-out);
}
.photo-item:hover img { transform:scale(1.04); }

/* hover overlay */
.photo-overlay {
  position:absolute; inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.82) 0%, rgba(0,0,0,.12) 50%, transparent 100%);
  opacity:0; transition:opacity .3s ease; z-index:1;
  display:flex; flex-direction:column; justify-content:flex-end; padding:14px;
}
.photo-item:hover .photo-overlay { opacity:1; }

.overlay-title { font-size:13px; font-weight:500; color:#fff; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.overlay-desc  { font-size:11px; color:rgba(255,255,255,.5); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* photo num */
.photo-num {
  position:absolute; bottom:8px; left:8px; z-index:3;
  font-size:9px; letter-spacing:.1em; color:rgba(255,255,255,.5);
  background:rgba(0,0,0,.55); backdrop-filter:blur(6px);
  padding:2px 7px; border-radius:3px;
  pointer-events:none; font-weight:500;
  transition:opacity .2s;
}

/* watermark */
.photo-wm {
  position:absolute; bottom:8px; right:8px; z-index:2;
  font-size:9px; color:rgba(255,255,255,.28); pointer-events:none; letter-spacing:.08em;
}

/* heart / favourite */
.photo-heart {
  position:absolute; top:9px; left:9px; z-index:4;
  width:30px; height:30px; border-radius:50%;
  background:rgba(0,0,0,.48); backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.12); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .2s, background .2s, transform .15s;
}
.photo-item:hover .photo-heart { opacity:1; }
.photo-heart.faved { opacity:1; background:var(--accent); border-color:var(--accent); }
.photo-heart:hover { transform:scale(1.12); }
.photo-heart svg { pointer-events:none; }

/* download */
.photo-dl {
  position:absolute; top:9px; right:9px; z-index:4;
  width:30px; height:30px; border-radius:50%;
  background:rgba(0,0,0,.48); backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.12);
  color:#fff; display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .2s, background .2s;
  cursor:pointer; text-decoration:none;
}
.photo-item:hover .photo-dl { opacity:1; }
.photo-dl:hover { background:var(--accent); }
.photo-dl svg { pointer-events:none; }

/* empty state */
.empty-state {
  grid-column:1/-1; text-align:center;
  padding:100px 20px;
}
.empty-icon { font-size:36px; margin-bottom:16px; opacity:.2; }
.empty-text { font-size:13px; color:var(--text-dim); }

/* ══════════════════════════════════════════════════════════
   LIGHTBOX
   ══════════════════════════════════════════════════════════ */
.lightbox {
  position:fixed; inset:0;
  background:var(--lb-bg);
  z-index:2000;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
  transition:opacity .3s ease;
}
.lightbox.open { opacity:1; pointer-events:all; }

.lb-close {
  position:absolute; top:16px; right:16px;
  width:36px; height:36px; border-radius:50%;
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.65); font-size:18px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; z-index:10;
  transition:background .2s, color .2s;
}
.lb-close:hover { background:rgba(255,255,255,.16); color:#fff; }

/* slideshow controls in lightbox */
.lb-top-bar {
  position:absolute; top:16px; left:16px;
  display:flex; align-items:center; gap:8px; z-index:10;
}
.lb-top-btn {
  height:32px; padding:0 14px; border-radius:99px;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.65); font-size:11px; letter-spacing:.08em;
  font-family:var(--font-body); cursor:pointer;
  display:flex; align-items:center; gap:6px;
  transition:background .2s, color .2s;
}
.lb-top-btn:hover { background:rgba(255,255,255,.14); color:#fff; }
.lb-top-btn.active { background:var(--accent); border-color:var(--accent); color:#000; }
.lb-heart-btn { width:32px; padding:0; justify-content:center; }
.lb-heart-btn.faved { background:var(--accent); border-color:var(--accent); color:#000; }

/* nav arrows */
.lb-nav {
  position:absolute; top:50%; transform:translateY(-50%);
  width:46px; height:46px; border-radius:50%;
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.65); font-size:22px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; z-index:10; user-select:none;
  transition:background .2s, color .2s;
}
.lb-nav:hover { background:rgba(255,255,255,.15); color:#fff; }
.lb-prev { left:14px; }
.lb-next { right:14px; }

/* progress bar for slideshow */
.lb-progress {
  position:absolute; top:0; left:0; right:0; height:2px;
  background:rgba(255,255,255,.1); z-index:11; display:none;
}
.lb-progress-bar {
  height:100%; background:var(--accent); width:0%;
  transition:width linear;
}

/* main image */
.lb-img-wrap {
  max-width:calc(100vw - 140px);
  max-height:calc(100vh - 230px);
  display:flex; align-items:center; justify-content:center;
  flex:1; position:relative;
}
.lb-img {
  max-width:100%; max-height:calc(100vh - 230px);
  object-fit:contain; border-radius:4px;
  transition:opacity .18s ease;
}

/* bottom info */
.lb-bottom {
  width:100%; padding:24px clamp(16px,4vw,70px) 20px;
  background:linear-gradient(to top, rgba(0,0,0,.88) 0%, transparent 100%);
  display:flex; align-items:flex-end; justify-content:space-between; gap:20px;
}

.lb-counter { font-size:10px; color:rgba(255,255,255,.3); letter-spacing:.22em; margin-bottom:7px; }
.lb-title {
  font-family:var(--font-display);
  font-size:clamp(22px,3.5vw,38px);
  letter-spacing:.05em; color:#fff;
  line-height:1; margin-bottom:5px;
}
.lb-desc { font-size:12px; color:rgba(255,255,255,.4); max-width:480px; }
.lb-tags { display:flex; flex-wrap:wrap; gap:5px; margin-top:10px; }
.lb-tag {
  font-size:10px; padding:3px 9px; border-radius:3px;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.4); letter-spacing:.05em;
}
.lb-tag.person { background:var(--accent-soft); border-color:var(--accent); color:var(--accent); }

.lb-right { display:flex; gap:8px; flex-shrink:0; }
.lb-dl-btn {
  display:flex; align-items:center; gap:8px;
  padding:10px 22px; border-radius:4px;
  background:var(--accent); color:#000;
  font-size:12px; font-weight:600;
  font-family:var(--font-body); letter-spacing:.07em;
  text-decoration:none; cursor:pointer;
  transition:opacity .2s, transform .2s;
}
.lb-dl-btn:hover { opacity:.85; transform:translateY(-1px); }

/* filmstrip */
.lb-strip-wrap {
  width:100%; overflow-x:auto; padding:0 clamp(16px,4vw,70px) 16px;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
  flex-shrink:0; display:none;
}
.lb-strip-wrap.show { display:block; }
.lb-strip {
  display:flex; gap:5px; width:max-content;
}
.lb-strip-thumb {
  width:60px; height:44px; border-radius:3px; overflow:hidden;
  border:2px solid transparent; cursor:pointer;
  transition:border-color .2s, opacity .2s; flex-shrink:0;
  opacity:.5;
}
.lb-strip-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.lb-strip-thumb.active { border-color:var(--accent); opacity:1; }
.lb-strip-thumb:hover { opacity:.85; }

/* ══════════════════════════════════════════════════════════
   SLIDESHOW OVERLAY (auto-play progress)
   ══════════════════════════════════════════════════════════ */
.lb-progress.show { display:block; }

/* ══════════════════════════════════════════════════════════
   FOOTER
   ══════════════════════════════════════════════════════════ */
.footer {
  text-align:center; padding:52px 24px;
  border-top:1px solid var(--border); margin-top:24px;
  transition:border-color var(--trans);
}
.footer-logo {
  font-family:var(--font-display); font-size:36px;
  letter-spacing:.14em; color:var(--accent); margin-bottom:8px;
  transition:color var(--trans);
}
.footer-line { height:1px; width:54px; background:var(--border); margin:14px auto; transition:background var(--trans); }
.footer-tagline { font-size:11px; color:var(--text-dim); letter-spacing:.18em; text-transform:uppercase; transition:color var(--trans); }
.footer-link { display:block; font-size:11px; color:var(--text-muted); margin-top:16px; text-decoration:none; letter-spacing:.1em; transition:color .2s; }
.footer-link:hover { color:var(--accent); }

/* ══════════════════════════════════════════════════════════
   KEYBOARD SHORTCUTS HINT
   ══════════════════════════════════════════════════════════ */
.shortcuts-hint {
  position:absolute; bottom:16px; right:16px;
  font-size:10px; color:rgba(255,255,255,.2); letter-spacing:.07em;
  pointer-events:none; z-index:5; text-align:right; line-height:2;
}

/* ══════════════════════════════════════════════════════════
   FAVOURITES PANEL
   ══════════════════════════════════════════════════════════ */
.fav-banner {
  position:sticky; top:var(--nav-h); z-index:99;
  background:var(--accent); color:#000;
  padding:10px clamp(16px,3vw,40px);
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  font-size:12px; font-weight:600; letter-spacing:.08em;
  transform:translateY(-100%); pointer-events:none;
  transition:transform .4s var(--ease-out);
}

/* ══════════════════════════════════════════════════════════
   LANGUAGE WAVE ANIMATION
   ══════════════════════════════════════════════════════════ */
let _waveRunning = false;
function animateLangWave(targetLang) {
  if (_waveRunning) return;
  _waveRunning = true;
  const canvas = document.getElementById('langWaveCanvas');
  canvas.style.display = 'block';
  canvas.classList.add('active');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx    = canvas.getContext('2d');
  const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
  const PHASE_DUR = 560, AMP = 60, FREQ = 0.009, BAND = 100;
  
  function easeInOut(t) { return t < 0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; }
  
  function leftFill(frontX, ph) {
    const H = canvas.height; ctx.beginPath(); ctx.moveTo(0, 0);
    for (let y = 0; y <= H; y += 3) ctx.lineTo(frontX + AMP * Math.sin(y * FREQ * Math.PI * 2 + ph), y);
    ctx.lineTo(0, H); ctx.closePath();
  }
  
  function rightFill(frontX, ph) {
    const W = canvas.width, H = canvas.height; ctx.beginPath(); ctx.moveTo(W, 0);
    for (let y = 0; y <= H; y += 3) ctx.lineTo(frontX + AMP * Math.sin(y * FREQ * Math.PI * 2 + ph), y);
    ctx.lineTo(W, H); ctx.closePath();
  }
  
  function drawGlowEdge(frontX, ph) {
    ctx.save(); ctx.shadowBlur = 16; ctx.shadowColor = accent;
    ctx.strokeStyle = accent; ctx.lineWidth = 1.5; ctx.beginPath();
    ctx.moveTo(frontX + AMP * Math.sin(0), 0);
    for (let y = 3; y <= canvas.height; y += 3)
      ctx.lineTo(frontX + AMP * Math.sin(y * FREQ * Math.PI * 2 + ph), y);
    ctx.stroke(); ctx.restore();
  }
  
  function drawFrame(frontX, phase, elapsed) {
    const W = canvas.width; ctx.clearRect(0, 0, W, canvas.height);
    const ph = elapsed * 0.003;
    if (phase === 1) {
      leftFill(frontX, ph);
      const gx = Math.max(0, frontX - BAND);
      const grad = ctx.createLinearGradient(gx, 0, frontX + AMP, 0);
      grad.addColorStop(0, accent + 'ee'); grad.addColorStop(0.75, accent + 'ee'); grad.addColorStop(1, accent + 'c0');
      ctx.fillStyle = grad; ctx.fill(); drawGlowEdge(frontX, ph);
    } else {
      rightFill(frontX, ph + Math.PI);
      const gx = frontX - AMP;
      const grad = ctx.createLinearGradient(gx, 0, gx + BAND, 0);
      grad.addColorStop(0, accent + '00'); grad.addColorStop(0.25, accent + 'c0'); grad.addColorStop(1, accent + 'ee');
      ctx.fillStyle = grad; ctx.fill(); drawGlowEdge(frontX, ph + Math.PI);
    }
  }
  
  let startTime = null, phase = 1;
  function tick(ts) {
    if (!startTime) startTime = ts;
    const elapsed  = ts - startTime;
    const raw      = Math.min(elapsed / PHASE_DUR, 1);
    const prog     = easeInOut(raw);
    const W        = canvas.width;
    const frontX   = -AMP + prog * (W + AMP * 2);
    drawFrame(frontX, phase, elapsed);
    
    if (phase === 1) {
      if (raw >= 1) {
        applyLang();
        phase = 2; startTime = null;
      }
    } else {
      if (raw >= 1) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        canvas.style.display = 'none';
        canvas.classList.remove('active');
        _waveRunning = false;
        return;
      }
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

    btn.addEventListener('click', () => {
      playSound('toggle');
      haptic(10);
      toggleTheme();
    });

  // sound toggles
  [document.getElementById('soundToggle'), document.getElementById('soundToggle-m')].forEach(btn => {
    if (btn) {
      btn.addEventListener('click', () => {
        soundEnabled = !soundEnabled;
        localStorage.setItem('mlx-sound', soundEnabled ? 'on' : 'off');
        updateSoundToggle();
        haptic(10);
        if (soundEnabled) playSound('toggle');
      });
    }
  });
  
  // lang toggles
  [document.getElementById('lang-toggle'), document.getElementById('lang-toggle-m')].forEach(btn => {
    btn.addEventListener('click', toggleLang);
  });
  
  // hamburger
  const ham = document.getElementById('hamburger');
  const mob = document.getElementById('nav-mobile');
  ham.addEventListener('click', () => {
    playSound('toggle');
    haptic(10);
    ham.classList.toggle('open');
    mob.classList.toggle('open');
  });
  document.addEventListener('click', e => {
    if (!mob.contains(e.target) && e.target !== ham && !ham.contains(e.target)) {
      ham.classList.remove('open'); mob.classList.remove('open');
    }
  });
  
  // Initialize button states
  updateSoundToggle();
}

  document.getElementById('fav-count-num').textContent = n;
  document.getElementById('fav-count-m').textContent = n;
  document.getElementById('nav-fav').classList.toggle('has-favs', n > 0);
  document.getElementById('fav-banner').classList.toggle('show', n > 0);
  document.getElementById('fav-banner-txt').textContent = S.favBanner(n);
  document.getElementById('fav-dl-all').textContent = S.favDl;
  document.getElementById('fav-clear').textContent = S.favClear;
  
  // render thumbnail strip
  const strip = document.getElementById('fav-strip');
  strip.innerHTML = '';
  favs.forEach(id => {
    const photo = CONFIG.photos.find(p => p.id === id);
    if (photo) {
      const thumb = document.createElement('img');
      thumb.src = photo.src;
      thumb.alt = photo.title;
      thumb.style.cssText = 'width:40px;height:40px;object-fit:cover;border-radius:3px;cursor:pointer;border:1px solid var(--border);transition:border-color 0.2s;';
      thumb.title = photo.title;
      thumb.addEventListener('click', () => {
        const idx = CONFIG.photos.findIndex(p => p.id === id);
        openLb(idx);
        playSound('universal');
        haptic(15);
      });
      thumb.addEventListener('mouseenter', () => thumb.style.borderColor = 'var(--accent)');
      thumb.addEventListener('mouseleave', () => thumb.style.borderColor = 'var(--border)');
      strip.appendChild(thumb);
    }
  });
  
  updateLbHeart();
}

function downloadFavs() {
  // Open each faved photo in new tab (real download requires server; this is client-side)
  favs.forEach(id => {
    const photo = CONFIG.photos.find(p => p.id === id);
    if (photo) {
      const a = document.createElement('a');
      a.href = photo.src; a.download = `MLX_${String(id).padStart(3,'0')}.jpg`;
      a.target = '_blank'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }
  });
}

function updateLbHeart() {
  if (!lbOpen) return;
  const photo = CONFIG.photos[lbIndex];
  const btn = document.getElementById('lb-heart');
  btn.classList.toggle('faved', favs.has(photo.id));
  btn.innerHTML = favs.has(photo.id)
    ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`
    : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
}

/* ══════════════════════════════════════════════════════════
   FILTERS
   ══════════════════════════════════════════════════════════ */
function buildFilters() {
  const allTags   = [...new Set(CONFIG.photos.flatMap(p=>p.tags))].sort();
  const allPeople = [...new Set(CONFIG.photos.flatMap(p=>p.people))].sort();
  const tr = document.getElementById('tags-row');
  const pr = document.getElementById('people-row');
  tr.innerHTML = ''; pr.innerHTML = '';
  if (allTags.length) {
    tr.appendChild(el('span','filter-label',S.tagsLabel));
    allTags.forEach(tag => {
      const p = el('button','pill',tag);
      p.addEventListener('click', () => toggle(activeTags, tag, p, applyFilters));
      tr.appendChild(p);
    });
  }
  if (allPeople.length) {
    pr.appendChild(el('span','filter-label',S.peopleLabel));
    allPeople.forEach(name => {
      const p = el('button','pill',name);
      p.addEventListener('click', () => toggle(activePeople, name, p, applyFilters));
      pr.appendChild(p);
    });
  }
}

function rebuildFilters() {
  const pills = document.querySelectorAll('#tags-row .filter-label, #people-row .filter-label');
  if (document.querySelector('#tags-row .filter-label'))
    document.querySelector('#tags-row .filter-label').textContent = S.tagsLabel;
  if (document.querySelector('#people-row .filter-label'))
    document.querySelector('#people-row .filter-label').textContent = S.peopleLabel;
}

function toggle(set, val, pill, cb) {
  set.has(val) ? set.delete(val) : set.add(val);
  playSound('universal');
  haptic(15);
  pill.classList.toggle('active', set.has(val));
  cb();
}

function applyFilters() {
  const q = searchQuery.toLowerCase().trim();
  filtered = CONFIG.photos.filter(p => {
    const mText   = !q || p.title.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q) ||
                    p.tags.some(t=>t.toLowerCase().includes(q)) || p.people.some(n=>n.toLowerCase().includes(q));
    const mTags   = !activeTags.size   || [...activeTags].every(t=>p.tags.includes(t));
    const mPeople = !activePeople.size || [...activePeople].every(n=>p.people.includes(n));
    return mText && mTags && mPeople;
  });
  renderGrid(filtered);
  updateCount(filtered.length, CONFIG.photos.length);
  const hasFilter = q || activeTags.size || activePeople.size;
  document.getElementById('results-clear').classList.toggle('visible', hasFilter);
}

function initSearch() {
  const inp = document.getElementById('search-input');
  let t;
  inp.addEventListener('input', () => {
    clearTimeout(t);
    t = setTimeout(()=>{ searchQuery = inp.value; applyFilters(); }, 200);
  });
  document.getElementById('results-clear').addEventListener('click', () => {
    playSound('universal');
    haptic(15);
    searchQuery = ''; inp.value = '';
    activeTags.clear(); activePeople.clear();
    document.querySelectorAll('.pill.active').forEach(p=>p.classList.remove('active'));
    applyFilters();
  });
}

function updateCount(shown, total) {
  const txt = shown===total ? S.countAll(total) : S.countFiltered(shown, total);
  document.getElementById('results-count').textContent = txt;
}

/* ══════════════════════════════════════════════════════════
   VIEW BUTTONS
   ══════════════════════════════════════════════════════════ */
function initViewBtns() {
  document.getElementById('btn-mosaic').addEventListener('click', () => { playSound('toggle'); haptic(10); setView('mosaic'); });
  document.getElementById('btn-grid').addEventListener('click', () => { playSound('toggle'); haptic(10); setView('grid'); });
  document.getElementById('btn-list').addEventListener('click', () => { playSound('toggle'); haptic(10); setView('list'); });
  document.getElementById('btn-filmstrip').addEventListener('click', () => { playSound('toggle'); haptic(10); toggleFilmstrip(); });
  document.getElementById('btn-slideshow').addEventListener('click', () => {
    if (!lbOpen && filtered.length) {
      openLb(CONFIG.photos.indexOf(filtered[0]));
      startSlideshow();
    }
  });
}

function setView(view) {
  currentView = view;
  const grid = document.getElementById('gallery-grid');
  grid.classList.remove('view-grid','view-list');
  if (view !== 'mosaic') grid.classList.add(`view-${view}`);
  ['btn-mosaic','btn-grid','btn-list'].forEach(id => {
    document.getElementById(id).classList.remove('active');
  });
  document.getElementById(`btn-${view}`).classList.add('active');
}

function toggleFilmstrip() {
  showStrip = !showStrip;
  document.getElementById('lb-strip-wrap').classList.toggle('show', showStrip);
  document.getElementById('btn-filmstrip').classList.toggle('active', showStrip);
}

/* ══════════════════════════════════════════════════════════
   RENDER GRID
   ══════════════════════════════════════════════════════════ */
function renderGrid(photos) {
  const grid = document.getElementById('gallery-grid');
  grid.innerHTML = '';

  if (!photos.length) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `<div class="empty-icon">🔍</div>
      <div style="font-size:14px;color:var(--text-muted);font-weight:500;margin-bottom:5px">${S.emptyTitle}</div>
      <div class="empty-text">${S.emptyText}</div>`;
    grid.appendChild(empty);
    return;
  }

  photos.forEach((photo, i) => {
    const gIdx = CONFIG.photos.indexOf(photo);
    const item = document.createElement('div');
    item.className = 'photo-item';
    item.dataset.orientation = photo.orientation;
    item.dataset.featured    = photo.featured ? 'true' : 'false';
    item.style.animationDelay = `${Math.min(i * 45, 650)}ms`;

    const img = document.createElement('img');
    img.src = photo.src; img.alt = photo.title; img.loading = 'lazy';
    item.appendChild(img);

    // number
    if (showNums) {
      item.appendChild(el('div','photo-num', String(photo.id).padStart(2,'0')));
    }

    // watermark
    if (CONFIG.watermarkText) {
      item.appendChild(el('div','photo-wm', CONFIG.watermarkText));
    }

    // overlay
    const ov = document.createElement('div');
    ov.className = 'photo-overlay';
    if (showDesc) {
      ov.innerHTML = `<div class="overlay-title">${esc(photo.title)}</div><div class="overlay-desc">${esc(photo.desc)}</div>`;
      if (currentView === 'list') {
        const tagHtml = photo.tags.map(t=>`<span class="overlay-tag">${esc(t)}</span>`).join('');
        ov.innerHTML += `<div class="overlay-tags">${tagHtml}</div>`;
      }
    }
    item.appendChild(ov);

    // heart
    const heart = document.createElement('button');
    heart.className = 'photo-heart' + (favs.has(photo.id) ? ' faved' : '');
    heart.dataset.id = photo.id;
    heart.title = 'Oblíbené / Favourite';
    heart.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="${favs.has(photo.id)?'currentColor':'none'}" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
    heart.addEventListener('click', e => {
      e.stopPropagation();
      toggleFav(photo.id);
      heart.classList.add('heart-pop');
      setTimeout(()=>heart.classList.remove('heart-pop'), 250);
      // update svg
      heart.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="${favs.has(photo.id)?'currentColor':'none'}" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
    });
    item.appendChild(heart);

    // download
    if (CONFIG.downloadEnabled) {
      const dl = document.createElement('a');
      dl.className = 'photo-dl';
      dl.href = photo.src; dl.download = `MLX_${String(photo.id).padStart(3,'0')}.jpg`;
      dl.target = '_blank'; dl.rel = 'noopener'; dl.title = S.download;
      dl.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
      dl.addEventListener('click', e => e.stopPropagation());
      item.appendChild(dl);
    }

    item.addEventListener('click', () => openLb(gIdx));
    grid.appendChild(item);
  });
}

/* ══════════════════════════════════════════════════════════
   LIGHTBOX
   ══════════════════════════════════════════════════════════ */
function initLightbox() {
  document.getElementById('lb-close').addEventListener('click', closeLb);
  document.getElementById('lb-prev').addEventListener('click',  () => { playSound('universal'); haptic(15); navigateLb(-1); });
  document.getElementById('lb-next').addEventListener('click',  () => { playSound('universal'); haptic(15); navigateLb(1); });
  document.getElementById('lb-heart').addEventListener('click', () => {
    const photo = CONFIG.photos[lbIndex];
    toggleFav(photo.id);
    // re-animate
    document.getElementById('lb-heart').classList.add('heart-pop');
    setTimeout(()=>document.getElementById('lb-heart').classList.remove('heart-pop'), 250);
  });
  document.getElementById('lb-ss-btn').addEventListener('click', () => {
    if (slideshowOn) { playSound('toggle'); haptic(10); stopSlideshow(); } else { playSound('toggle'); haptic(10); startSlideshow(); }
  });

  // Click outside
  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeLb();
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (!lbOpen) return;
    if (e.key === 'Escape')      { closeLb(); return; }
    if (e.key === 'ArrowLeft')   { navigateLb(-1); return; }
    if (e.key === 'ArrowRight')  { navigateLb(1);  return; }
    if (e.key === ' ')           { e.preventDefault(); slideshowOn ? stopSlideshow() : startSlideshow(); return; }
    if (e.key.toLowerCase() === 'f') { toggleFav(CONFIG.photos[lbIndex].id); updateLbHeart(); }
  });

  // Swipe
  let sx = 0;
  const lb = document.getElementById('lightbox');
  lb.addEventListener('touchstart', e => { sx = e.changedTouches[0].clientX; }, {passive:true});
  lb.addEventListener('touchend',   e => {
    const dx = e.changedTouches[0].clientX - sx;
    if (Math.abs(dx) > 50) navigateLb(dx < 0 ? 1 : -1);
  });

  // Build filmstrip
  buildFilmstrip();
}

function buildFilmstrip() {
  const strip = document.getElementById('lb-strip');
  strip.innerHTML = '';
  CONFIG.photos.forEach((photo, i) => {
    const th = document.createElement('div');
    th.className = 'lb-strip-thumb';
    th.dataset.idx = i;
    th.innerHTML = `<img src="${photo.src}" alt="${esc(photo.title)}" loading="lazy">`;
    th.addEventListener('click', () => { lbIndex = i; refreshLb(); });
    strip.appendChild(th);
  });
}

function openLb(gIdx) {
  playSound('universal');
  haptic(20);
  lbIndex = gIdx; lbOpen = true;
  refreshLb();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLb() {
  playSound('toggle');
  haptic(10);
  stopSlideshow();
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
  lbOpen = false;
}

function navigateLb(dir) {
  lbIndex = (lbIndex + dir + CONFIG.photos.length) % CONFIG.photos.length;
  if (slideshowOn) resetSsTimer();
  refreshLb();
}

function refreshLb() {
  const photo = CONFIG.photos[lbIndex];
  const img   = document.getElementById('lb-img');
  img.style.opacity = '0';
  setTimeout(() => { img.src = photo.src; img.alt = photo.title; img.style.opacity = '1'; }, 160);

  document.getElementById('lb-counter').textContent =
    `${String(photo.id).padStart(2,'0')} / ${String(CONFIG.photos.length).padStart(2,'0')}`;
  document.getElementById('lb-title').textContent = photo.title;
  document.getElementById('lb-desc').textContent  = photo.desc;

  const tags = document.getElementById('lb-tags');
  tags.innerHTML = [
    ...photo.tags.map(t=>`<span class="lb-tag">${esc(t)}</span>`),
    ...photo.people.map(n=>`<span class="lb-tag person">${esc(n)}</span>`)
  ].join('');

  document.getElementById('lb-right').innerHTML = CONFIG.downloadEnabled
    ? `<a class="lb-dl-btn" href="${photo.src}" download="MLX_${String(photo.id).padStart(3,'0')}.jpg" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        ${S.download}</a>`
    : '';

  // filmstrip scroll
  const thumbs = document.querySelectorAll('.lb-strip-thumb');
  thumbs.forEach((t,i) => t.classList.toggle('active', i === lbIndex));
  const activeThumb = document.querySelector('.lb-strip-thumb.active');
  if (activeThumb) activeThumb.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});

  updateLbHeart();
}

/* ══════════════════════════════════════════════════════════
   SLIDESHOW
   ══════════════════════════════════════════════════════════ */
function initSlideshow() {
  document.getElementById('btn-slideshow').addEventListener('click', () => {
    if (slideshowOn) { stopSlideshow(); }
    else {
      if (!lbOpen && filtered.length) openLb(CONFIG.photos.indexOf(filtered[0]));
      startSlideshow();
    }
  });
}

function startSlideshow() {
  playSound('toggle');
  haptic(20);
  slideshowOn = true;
  document.getElementById('lb-ss-btn').classList.add('active');
  document.getElementById('lb-ss-txt').textContent = S.stopSlide;
  document.getElementById('btn-slideshow').classList.add('active');
  document.getElementById('btn-slideshow-txt').textContent = S.stopSlide;
  document.getElementById('lb-progress').classList.add('show');
  runSsStep();
}

function stopSlideshow() {
  slideshowOn = false;
  clearTimeout(ssTimer);
  document.getElementById('lb-ss-btn').classList.remove('active');
  document.getElementById('lb-ss-txt').textContent = S.slideshow;
  document.getElementById('btn-slideshow').classList.remove('active');
  document.getElementById('btn-slideshow-txt').textContent = S.slideshow;
  document.getElementById('lb-progress').classList.remove('show');
  const bar = document.getElementById('lb-progress-bar');
  bar.style.transition = 'none'; bar.style.width = '0%';
}

function runSsStep() {
  if (!slideshowOn) return;
  const bar = document.getElementById('lb-progress-bar');
  bar.style.transition = 'none'; bar.style.width = '0%';
  requestAnimationFrame(() => {
    bar.style.transition = `width ${CONFIG.slideshowSpeed}ms linear`;
    bar.style.width = '100%';
  });
  ssTimer = setTimeout(() => {
    lbIndex = (lbIndex + 1) % CONFIG.photos.length;
    refreshLb();
    runSsStep();
  }, CONFIG.slideshowSpeed);
}

function resetSsTimer() {
  clearTimeout(ssTimer);
  runSsStep();
}

/* ══════════════════════════════════════════════════════════
   UTILS
   ══════════════════════════════════════════════════════════ */
function el(tag, cls, txt) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (txt !== undefined) e.textContent = txt;
  return e;
}
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Boot ── */
document.addEventListener('DOMContentLoaded', init);
</script>
